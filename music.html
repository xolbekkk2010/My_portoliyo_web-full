<!doctype html> 
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&amp;family=Playfair+Display:wght@500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .song-row { transition: background 0.2s ease; }
    .song-row:hover { background: rgba(255,255,255,0.06); }
    .song-row.active { background: rgba(255,255,255,0.1); }

    .play-btn { transition: transform 0.15s ease, box-shadow 0.2s ease; }
    .play-btn:hover { transform: scale(1.08); }
    .play-btn:active { transform: scale(0.96); }

    .progress-track { cursor: pointer; }
    .progress-track:hover .progress-fill { height: 6px; }
    .progress-fill { transition: height 0.15s ease; height: 4px; }

    .album-art { animation: pulse-glow 4s ease-in-out infinite alternate; }
    @keyframes pulse-glow {
      0% { box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
      100% { box-shadow: 0 8px 60px rgba(0,0,0,0.7), 0 0 80px rgba(var(--accent-rgb), 0.15); }
    }

    .vinyl-spin { animation: spin 3s linear infinite; animation-play-state: paused; }
    .vinyl-spin.playing { animation-play-state: running; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .nav-item { transition: color 0.2s ease, opacity 0.2s ease; }
    .nav-item:hover { opacity: 1; }

    .fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }

    .slide-up { animation: slideUp 0.4s ease forwards; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    .like-btn { transition: transform 0.2s ease; }
    .like-btn:active { transform: scale(1.3); }

    .volume-slider { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full flex flex-col overflow-hidden" style="background: #0d0d0f; color: #e8e6e3; font-family: 'DM Sans', sans-serif;"><!-- Top Bar -->
   <header class="flex items-center justify-between px-6 pt-5 pb-3 fade-in" style="animation-delay: 0.1s;">
    <div>
     <p id="greeting" class="text-sm font-medium" style="color: #7a7880;">Good evening</p>
     <h1 id="app-title" class="text-xl font-bold mt-0.5" style="font-family: 'Playfair Display', serif;">Resonance</h1>
    </div>
    <div class="flex items-center gap-3"><button class="p-2 rounded-full hover:bg-white/10 transition-colors" aria-label="Search"> <i data-lucide="search" style="width:20px;height:20px;color:#7a7880;"></i> </button> <button class="p-2 rounded-full hover:bg-white/10 transition-colors" aria-label="Notifications"> <i data-lucide="bell" style="width:20px;height:20px;color:#7a7880;"></i> </button>
    </div>
   </header><!-- Scrollable Content -->
   <main class="flex-1 overflow-y-auto px-6 pb-44"><!-- Now Playing Hero -->
    <section class="mt-4 mb-8 fade-in" style="animation-delay: 0.2s;">
     <div class="relative rounded-2xl overflow-hidden p-6" style="background: linear-gradient(135deg, #1a1520 0%, #0d0d0f 60%, #151218 100%);">
      <div class="absolute top-0 right-0 w-48 h-48 rounded-full opacity-20 blur-3xl" style="background: #c45e3a;"></div>
      <div class="flex items-center gap-5 relative z-10">
       <div class="album-art relative w-20 h-20 rounded-xl overflow-hidden flex-shrink-0" style="background: linear-gradient(135deg, #c45e3a, #8b3a5e);">
        <div class="absolute inset-0 flex items-center justify-center">
         <div class="vinyl-spin w-10 h-10 rounded-full border-2 border-white/20 flex items-center justify-center" id="vinyl">
          <div class="w-3 h-3 rounded-full" style="background: #e8e6e3;"></div>
         </div>
        </div>
       </div>
       <div class="flex-1 min-w-0">
        <p class="text-xs font-medium uppercase tracking-widest mb-1" style="color: #c45e3a;">Now Playing</p>
        <h2 id="current-title" class="text-lg font-bold truncate">Midnight Drift</h2>
        <p id="current-artist" class="text-sm truncate" style="color: #7a7880;">Neon Waves</p>
       </div><button class="like-btn p-2" id="hero-like" aria-label="Like song"> <i data-lucide="heart" style="width:22px;height:22px;color:#7a7880;" id="hero-like-icon"></i> </button>
      </div>
     </div>
    </section><!-- Playlist Section -->
    <section class="mb-6 slide-up" style="animation-delay: 0.3s;">
     <div class="flex items-center justify-between mb-4">
      <h3 id="playlist-title" class="text-base font-bold">Chill Frequencies</h3><button class="text-xs font-medium" style="color: #c45e3a;">See all</button>
     </div>
     <div id="song-list" class="flex flex-col gap-1 rounded-xl overflow-hidden"><!-- Songs rendered by JS -->
     </div>
    </section><!-- Quick Mix Section -->
    <section class="mb-6 slide-up" style="animation-delay: 0.4s;">
     <h3 class="text-base font-bold mb-4">Quick Mixes</h3>
     <div class="grid grid-cols-2 gap-3" id="mixes-grid"><!-- Rendered by JS -->
     </div>
    </section>
   </main><!-- Player Bar -->
   <div class="fixed bottom-0 left-0 right-0 z-50" style="background: linear-gradient(to top, #0d0d0f 80%, transparent);"><!-- Progress -->
    <div class="progress-track px-6" id="progress-track">
     <div class="w-full rounded-full overflow-hidden" style="background: rgba(255,255,255,0.08);">
      <div class="progress-fill rounded-full" id="progress-fill" style="width: 35%; background: #c45e3a;"></div>
     </div>
    </div>
    <div class="flex items-center justify-between px-6 text-xs mt-1" style="color: #7a7880;"><span id="time-current">1:23</span> <span id="time-total">3:54</span>
    </div><!-- Controls -->
    <div class="flex items-center justify-between px-6 py-3"><button class="p-2 nav-item opacity-60" id="btn-shuffle" aria-label="Shuffle"> <i data-lucide="shuffle" style="width:18px;height:18px;"></i> </button> <button class="p-2 nav-item opacity-60" id="btn-prev" aria-label="Previous"> <i data-lucide="skip-back" style="width:22px;height:22px;"></i> </button> <button class="play-btn w-14 h-14 rounded-full flex items-center justify-center" id="btn-play" style="background: #c45e3a;" aria-label="Play"> <i data-lucide="play" style="width:24px;height:24px;color:#fff;" id="play-icon"></i> </button> <button class="p-2 nav-item opacity-60" id="btn-next" aria-label="Next"> <i data-lucide="skip-forward" style="width:22px;height:22px;"></i> </button> <button class="p-2 nav-item opacity-60" id="btn-repeat" aria-label="Repeat"> <i data-lucide="repeat" style="width:18px;height:18px;"></i> </button>
    </div><!-- Volume -->
    <div class="flex items-center gap-3 px-6 pb-5"><i data-lucide="volume-1" style="width:16px;height:16px;color:#7a7880;"></i> <input type="range" min="0" max="100" value="70" class="volume-slider flex-1" id="volume-slider" style="background: linear-gradient(to right, #c45e3a 70%, rgba(255,255,255,0.1) 70%);" aria-label="Volume"> <i data-lucide="volume-2" style="width:16px;height:16px;color:#7a7880;"></i>
    </div>
   </div>
  </div>
  <script>
    // ---- Data ----
    const songs = [
      { id: 1, title: "Midnight Drift", artist: "Neon Waves", duration: "3:54", gradient: "linear-gradient(135deg, #c45e3a, #8b3a5e)" },
      { id: 2, title: "Solar Flare", artist: "Echo Atlas", duration: "4:12", gradient: "linear-gradient(135deg, #d4a03a, #c45e3a)" },
      { id: 3, title: "Deep Current", artist: "Velvet Haze", duration: "3:28", gradient: "linear-gradient(135deg, #3a6fc4, #3a8b8b)" },
      { id: 4, title: "Ghost Signal", artist: "Phantom Circuit", duration: "5:01", gradient: "linear-gradient(135deg, #6b3ac4, #c43a8b)" },
      { id: 5, title: "Amber Light", artist: "Still Motion", duration: "3:45", gradient: "linear-gradient(135deg, #c4953a, #8b6b3a)" },
      { id: 6, title: "Cloud Nine", artist: "Aerial", duration: "4:33", gradient: "linear-gradient(135deg, #3a8bc4, #3a5ec4)" }
    ];

    const mixes = [
      { title: "Late Night", emoji: "🌙", bg: "linear-gradient(135deg, #1a1530, #2a1a35)" },
      { title: "Focus Flow", emoji: "🎯", bg: "linear-gradient(135deg, #15201a, #1a2a20)" },
      { title: "Warm Tones", emoji: "🔥", bg: "linear-gradient(135deg, #201510, #2a1a15)" },
      { title: "Dream Pop", emoji: "☁️", bg: "linear-gradient(135deg, #151520, #1a1a2a)" }
    ];

    // ---- State ----
    let currentSongIndex = 0;
    let isPlaying = false;
    let likedSongs = new Set();
    let progress = 35;
    let shuffleOn = false;
    let repeatOn = false;
    let progressInterval = null;

    // ---- Render Songs ----
    function renderSongs() {
      const list = document.getElementById('song-list');
      list.innerHTML = '';
      songs.forEach((song, i) => {
        const row = document.createElement('div');
        row.className = `song-row flex items-center gap-4 px-4 py-3 rounded-lg cursor-pointer ${i === currentSongIndex ? 'active' : ''}`;
        row.dataset.index = i;
        const liked = likedSongs.has(song.id);
        row.innerHTML = `
          <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 relative overflow-hidden" style="background: ${song.gradient};">
            <span class="text-white text-xs font-bold">${i === currentSongIndex && isPlaying ? '▶' : (i + 1)}</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold truncate" style="color: ${i === currentSongIndex ? '#c45e3a' : '#e8e6e3'};">${song.title}</p>
            <p class="text-xs truncate" style="color: #7a7880;">${song.artist}</p>
          </div>
          <span class="text-xs flex-shrink-0" style="color: #7a7880;">${song.duration}</span>
          <button class="like-btn p-1 flex-shrink-0" data-song-id="${song.id}" aria-label="Like ${song.title}">
            <i data-lucide="heart" style="width:16px;height:16px;color:${liked ? '#c45e3a' : '#7a7880'};${liked ? 'fill:#c45e3a;' : ''}"></i>
          </button>
        `;
        row.addEventListener('click', (e) => {
          if (e.target.closest('.like-btn')) return;
          playSong(i);
        });
        row.querySelector('.like-btn').addEventListener('click', () => toggleLike(song.id));
        list.appendChild(row);
      });
      lucide.createIcons();
    }

    // ---- Render Mixes ----
    function renderMixes() {
      const grid = document.getElementById('mixes-grid');
      grid.innerHTML = '';
      mixes.forEach(mix => {
        const card = document.createElement('div');
        card.className = 'rounded-xl p-4 cursor-pointer hover:scale-[1.02] transition-transform';
        card.style.background = mix.bg;
        card.innerHTML = `
          <span class="text-2xl">${mix.emoji}</span>
          <p class="text-sm font-semibold mt-2">${mix.title}</p>
          <p class="text-xs mt-1" style="color: #7a7880;">24 songs</p>
        `;
        grid.appendChild(card);
      });
    }

    // ---- Play Song ----
    function playSong(index) {
      currentSongIndex = index;
      isPlaying = true;
      progress = 0;
      updatePlayer();
      renderSongs();
      startProgress();
    }

    function updatePlayer() {
      const song = songs[currentSongIndex];
      document.getElementById('current-title').textContent = song.title;
      document.getElementById('current-artist').textContent = song.artist;
      document.getElementById('time-total').textContent = song.duration;

      const playIcon = document.getElementById('play-icon');
      playIcon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');

      const vinyl = document.getElementById('vinyl');
      if (isPlaying) vinyl.classList.add('playing');
      else vinyl.classList.remove('playing');

      const heroLiked = likedSongs.has(song.id);
      const heroIcon = document.getElementById('hero-like-icon');
      heroIcon.style.color = heroLiked ? '#c45e3a' : '#7a7880';
      heroIcon.style.fill = heroLiked ? '#c45e3a' : 'none';

      lucide.createIcons();
    }

    // ---- Progress ----
    function startProgress() {
      if (progressInterval) clearInterval(progressInterval);
      progressInterval = setInterval(() => {
        if (!isPlaying) return;
        progress += 0.3;
        if (progress >= 100) {
          if (repeatOn) { progress = 0; }
          else { nextSong(); return; }
        }
        updateProgress();
      }, 100);
    }

    function updateProgress() {
      document.getElementById('progress-fill').style.width = progress + '%';
      const song = songs[currentSongIndex];
      const parts = song.duration.split(':');
      const totalSec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
      const currentSec = Math.floor(totalSec * progress / 100);
      const m = Math.floor(currentSec / 60);
      const s = currentSec % 60;
      document.getElementById('time-current').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }

    function nextSong() {
      let next = shuffleOn ? Math.floor(Math.random() * songs.length) : (currentSongIndex + 1) % songs.length;
      playSong(next);
    }

    function prevSong() {
      if (progress > 10) { progress = 0; updateProgress(); return; }
      let prev = (currentSongIndex - 1 + songs.length) % songs.length;
      playSong(prev);
    }

    // ---- Toggle Like ----
    function toggleLike(songId) {
      if (likedSongs.has(songId)) likedSongs.delete(songId);
      else likedSongs.add(songId);
      renderSongs();
      updatePlayer();
    }

    // ---- Events ----
    document.getElementById('btn-play').addEventListener('click', () => {
      isPlaying = !isPlaying;
      updatePlayer();
      if (isPlaying) startProgress();
    });

    document.getElementById('btn-next').addEventListener('click', nextSong);
    document.getElementById('btn-prev').addEventListener('click', prevSong);

    document.getElementById('btn-shuffle').addEventListener('click', () => {
      shuffleOn = !shuffleOn;
      document.getElementById('btn-shuffle').style.opacity = shuffleOn ? '1' : '0.6';
      document.getElementById('btn-shuffle').style.color = shuffleOn ? '#c45e3a' : '#e8e6e3';
    });

    document.getElementById('btn-repeat').addEventListener('click', () => {
      repeatOn = !repeatOn;
      document.getElementById('btn-repeat').style.opacity = repeatOn ? '1' : '0.6';
      document.getElementById('btn-repeat').style.color = repeatOn ? '#c45e3a' : '#e8e6e3';
    });

    document.getElementById('hero-like').addEventListener('click', () => {
      toggleLike(songs[currentSongIndex].id);
    });

    document.getElementById('progress-track').addEventListener('click', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      progress = ((e.clientX - rect.left) / rect.width) * 100;
      updateProgress();
    });

    document.getElementById('volume-slider').addEventListener('input', (e) => {
      const v = e.target.value;
      e.target.style.background = `linear-gradient(to right, #c45e3a ${v}%, rgba(255,255,255,0.1) ${v}%)`;
    });

    // ---- Element SDK ----
    const defaultConfig = {
      app_title: "Resonance",
      playlist_title: "Chill Frequencies",
      greeting_text: "Good evening",
      background_color: "#0d0d0f",
      surface_color: "#1a1520",
      text_color: "#e8e6e3",
      primary_action_color: "#c45e3a",
      secondary_action_color: "#7a7880",
      font_family: "DM Sans",
      font_size: 14
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };

      document.getElementById('app-title').textContent = c.app_title;
      document.getElementById('playlist-title').textContent = c.playlist_title;
      document.getElementById('greeting').textContent = c.greeting_text;

      // Colors
      const app = document.getElementById('app');
      app.style.background = c.background_color;
      app.style.color = c.text_color;

      // Font
      const fontStack = `${c.font_family}, 'DM Sans', sans-serif`;
      app.style.fontFamily = fontStack;

      // Font size scaling
      const base = c.font_size || 14;
      document.getElementById('app-title').style.fontSize = `${base * 1.5}px`;
      document.getElementById('greeting').style.fontSize = `${base * 0.85}px`;
      document.getElementById('playlist-title').style.fontSize = `${base * 1.14}px`;
      document.getElementById('current-title').style.fontSize = `${base * 1.28}px`;
      document.getElementById('current-artist').style.fontSize = `${base}px`;

      // Primary action color on play button
      document.getElementById('btn-play').style.background = c.primary_action_color;
      document.getElementById('progress-fill').style.background = c.primary_action_color;

      // Secondary text
      document.getElementById('greeting').style.color = c.secondary_action_color;
      document.getElementById('current-artist').style.color = c.secondary_action_color;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { applyConfig(config); },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ["app_title", config.app_title || defaultConfig.app_title],
        ["playlist_title", config.playlist_title || defaultConfig.playlist_title],
        ["greeting_text", config.greeting_text || defaultConfig.greeting_text]
      ])
    });

    // ---- Init ----
    renderSongs();
    renderMixes();
    lucide.createIcons();
  </script>
