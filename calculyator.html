<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }

    .calc-btn {
      transition: all 0.12s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .calc-btn:active {
      transform: scale(0.93);
    }
    .calc-btn:hover {
      filter: brightness(1.1);
    }

    .display-text {
      transition: font-size 0.15s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: slideUp 0.4s ease forwards;
    }
    .animate-delay-1 { animation-delay: 0.05s; opacity: 0; }
    .animate-delay-2 { animation-delay: 0.1s; opacity: 0; }
    .animate-delay-3 { animation-delay: 0.15s; opacity: 0; }
    .animate-delay-4 { animation-delay: 0.2s; opacity: 0; }
    .animate-delay-5 { animation-delay: 0.25s; opacity: 0; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full">
  <main id="app-wrapper" class="h-full w-full flex items-center justify-center p-4" style="background: #1a1a2e; font-family: 'Outfit', sans-serif;">
   <div class="w-full max-w-sm animate-in"><!-- Title -->
    <p id="calc-title" class="text-center mb-4 tracking-widest uppercase animate-in animate-delay-1" style="color: #6c63ff; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em;">Calculator</p><!-- Display -->
    <div class="rounded-2xl p-5 mb-3 animate-in animate-delay-2" style="background: #16213e; border: 1px solid #2a2a4a;">
     <div id="expression" class="text-right h-6 truncate" style="color: #6c63ff; font-family: 'DM Mono', monospace; font-size: 13px; opacity: 0.8;"></div>
     <div id="display" class="display-text text-right font-light truncate mt-1" style="color: #e8e8f0; font-family: 'DM Mono', monospace; font-size: 48px;">
      0
     </div>
    </div><!-- Buttons Grid -->
    <div class="grid grid-cols-4 gap-2 animate-in animate-delay-3"><!-- Row 1 --> <button class="calc-btn rounded-xl py-4 text-base font-medium" style="background: #2a2a4a; color: #6c63ff;" onclick="clearAll()">AC</button> <button class="calc-btn rounded-xl py-4 text-base font-medium" style="background: #2a2a4a; color: #6c63ff;" onclick="toggleSign()">+/−</button> <button class="calc-btn rounded-xl py-4 text-base font-medium" style="background: #2a2a4a; color: #6c63ff;" onclick="inputPercent()">%</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #6c63ff; color: #1a1a2e;" onclick="inputOperator('/')">÷</button> <!-- Row 2 --> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('7')">7</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('8')">8</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('9')">9</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #6c63ff; color: #1a1a2e;" onclick="inputOperator('*')">×</button> <!-- Row 3 --> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('4')">4</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('5')">5</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('6')">6</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #6c63ff; color: #1a1a2e;" onclick="inputOperator('-')">−</button> <!-- Row 4 --> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('1')">1</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('2')">2</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('3')">3</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #6c63ff; color: #1a1a2e;" onclick="inputOperator('+')">+</button> <!-- Row 5 --> <button class="calc-btn rounded-xl py-4 text-lg font-medium col-span-2" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDigit('0')">0</button> <button class="calc-btn rounded-xl py-4 text-lg font-medium" style="background: #16213e; color: #e8e8f0; border: 1px solid #2a2a4a;" onclick="inputDecimal()">.</button> <button class="calc-btn rounded-xl py-4 text-lg font-semibold" style="background: #e8e8f0; color: #1a1a2e;" onclick="calculate()">=</button>
    </div>
   </div>
  </main>
  <script>
    // Calculator state
    let currentValue = '0';
    let previousValue = '';
    let operator = null;
    let shouldResetDisplay = false;
    let expressionText = '';

    const displayEl = document.getElementById('display');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      let displayText = currentValue;
      // Adjust font size for long numbers
      const len = displayText.length;
      if (len > 12) displayEl.style.fontSize = '28px';
      else if (len > 9) displayEl.style.fontSize = '34px';
      else if (len > 7) displayEl.style.fontSize = '40px';
      else displayEl.style.fontSize = '48px';

      displayEl.textContent = displayText;
      expressionEl.textContent = expressionText;
    }

    function inputDigit(digit) {
      if (shouldResetDisplay) {
        currentValue = digit;
        shouldResetDisplay = false;
      } else {
        if (currentValue.replace('-','').replace('.','').length >= 15) return;
        currentValue = currentValue === '0' ? digit : currentValue + digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (shouldResetDisplay) {
        currentValue = '0.';
        shouldResetDisplay = false;
        updateDisplay();
        return;
      }
      if (!currentValue.includes('.')) {
        currentValue += '.';
      }
      updateDisplay();
    }

    function inputOperator(op) {
      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      if (operator && !shouldResetDisplay) {
        calculate(true);
      }
      previousValue = currentValue;
      operator = op;
      shouldResetDisplay = true;
      expressionText = formatNumber(previousValue) + ' ' + opSymbols[op];
      updateDisplay();
    }

    function calculate(chaining) {
      if (!operator || !previousValue) return;
      const prev = parseFloat(previousValue);
      const curr = parseFloat(currentValue);
      let result;

      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };

      switch (operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/': result = curr === 0 ? 'Error' : prev / curr; break;
      }

      if (!chaining) {
        expressionText = formatNumber(previousValue) + ' ' + opSymbols[operator] + ' ' + formatNumber(currentValue) + ' =';
      }

      if (result === 'Error') {
        currentValue = 'Error';
      } else {
        // Round to avoid floating point issues
        currentValue = String(parseFloat(result.toPrecision(12)));
      }

      operator = chaining ? operator : null;
      previousValue = chaining ? currentValue : '';
      shouldResetDisplay = true;
      updateDisplay();
    }

    function clearAll() {
      currentValue = '0';
      previousValue = '';
      operator = null;
      shouldResetDisplay = false;
      expressionText = '';
      updateDisplay();
    }

    function toggleSign() {
      if (currentValue === '0' || currentValue === 'Error') return;
      currentValue = currentValue.startsWith('-') ? currentValue.slice(1) : '-' + currentValue;
      updateDisplay();
    }

    function inputPercent() {
      if (currentValue === 'Error') return;
      currentValue = String(parseFloat(currentValue) / 100);
      updateDisplay();
    }

    function formatNumber(val) {
      const num = parseFloat(val);
      if (isNaN(num)) return val;
      if (Number.isInteger(num) && !val.includes('.')) return num.toLocaleString();
      return val;
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') inputOperator('+');
      else if (e.key === '-') inputOperator('-');
      else if (e.key === '*') inputOperator('*');
      else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape' || e.key === 'Delete') clearAll();
      else if (e.key === 'Backspace') {
        if (currentValue.length > 1) currentValue = currentValue.slice(0, -1);
        else currentValue = '0';
        updateDisplay();
      }
      else if (e.key === '%') inputPercent();
    });

    // Element SDK
    const defaultConfig = {
      title_text: 'Calculator',
      background_color: '#1a1a2e',
      surface_color: '#16213e',
      text_color: '#e8e8f0',
      primary_action_color: '#6c63ff',
      secondary_action_color: '#2a2a4a',
      font_family: 'Outfit',
      font_size: 16
    };

    function applyConfig(config) {
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      const font = config.font_family || defaultConfig.font_family;
      const baseSize = config.font_size || defaultConfig.font_size;
      const title = config.title_text || defaultConfig.title_text;

      const wrapper = document.getElementById('app-wrapper');
      wrapper.style.background = bg;
      wrapper.style.fontFamily = `${font}, Outfit, sans-serif`;

      const titleEl = document.getElementById('calc-title');
      titleEl.textContent = title;
      titleEl.style.color = primary;
      titleEl.style.fontSize = `${baseSize * 0.69}px`;

      // Display area
      const displayArea = displayEl.parentElement;
      displayArea.style.background = surface;
      displayArea.style.borderColor = secondary;
      displayEl.style.color = text;
      displayEl.style.fontFamily = `'DM Mono', ${font}, monospace`;
      expressionEl.style.color = primary;
      expressionEl.style.fontFamily = `'DM Mono', ${font}, monospace`;

      // Buttons
      const allBtns = document.querySelectorAll('.calc-btn');
      allBtns.forEach(btn => {
        const txt = btn.textContent.trim();
        btn.style.fontSize = `${baseSize * 1.1}px`;
        btn.style.fontFamily = `${font}, Outfit, sans-serif`;

        if (['AC', '+/−', '%'].includes(txt)) {
          btn.style.background = secondary;
          btn.style.color = primary;
        } else if (['÷', '×', '−', '+'].includes(txt)) {
          btn.style.background = primary;
          btn.style.color = bg;
        } else if (txt === '=') {
          btn.style.background = text;
          btn.style.color = bg;
        } else {
          btn.style.background = surface;
          btn.style.color = text;
          btn.style.borderColor = secondary;
        }
      });
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['title_text', config.title_text || defaultConfig.title_text]
        ])
      });
    }

    updateDisplay();
  </script>
